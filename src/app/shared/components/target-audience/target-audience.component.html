<section class="w-full bg-[#EEF6F9] py-16 md:py-24 px-6 font-sans">
  <div class="max-w-7xl mx-auto">

    <h2 class="text-3xl md:text-4xl font-bold text-center text-[#2D4A5E] mb-12 md:mb-16">
      ¿A quién ayudamos?
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-[15px] w-fit mx-auto">

      @for (perfil of perfiles; track perfil.titulo) {
      <div
        class="bg-white rounded-2xl py-5 px-3 shadow-sm border border-grayFive flex flex-col transition-all duration-300 hover:shadow-lg group w-[306px] h-[175px]">

        <div class="flex items-center gap-4 mb-6">
          <div
            class="w-12 h-12 rounded-full bg-third flex items-center justify-center shrink-0 group-hover:scale-110 transition-transform">
            <img [src]="'assets/imgs/' + perfil.icon" [alt]="perfil.titulo" class="w-6 h-6">
          </div>
          <h3 class="font-bold text-blueFive text-size18">{{ perfil.titulo }}</h3>
        </div>

        <p class="text-size14 text-grayNine leading-5">
          {{ perfil.desc }}
        </p>

      </div>
      }

    </div>
  </div>
</section>
