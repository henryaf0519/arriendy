<div
  #statsSection
  class="w-full flex flex-col lg:flex-row items-stretch font-sans h-[492px] overflow-hidden relative bgGradient"
>
  <div class="w-full lg:w-1/2 h-full">
    <img
      src="assets/gifs/bakery.gif"
      alt="Respaldo SURA"
      class="w-full h-full object-fill object-center"
    />
  </div>

  <div
    class="w-full lg:w-1/2 py-12 lg:py-16 px-6 lg:pl-4 lg:pr-20 flex flex-col justify-center relative h-full lg:-ml-16 z-10"
  >
    

    <h2
      class="text-[28px] lg:text-[34px] font-bold text-blueFive leading-tight mb-8 z-0 relative"
    >
      El Respaldo y la Experiencia de <span class="text-blueFour">SURA</span>
    </h2>

    <div class="space-y-4 max-w-md z-0 relative">
      @for (stat of stats(); track stat.title) {
        <div
          class="flex items-center p-6 lg:p-7 bg-white rounded-[20px]"
          [class]="
            stat.isHighlighted
              ? 'border border-blueThree shadow-[0_0_15px_rgba(0,209,255,0.15)]'
              : 'border border-graySix shadow-sm'
          "
        >
          <div
            class="text-size68 lg:text-[48px] font-extrabold leading-none mr-4 min-w-[150px] lg:min-w-[190px] tabular-nums"
            [class]="stat.isHighlighted ? 'text-blueTwo' : 'text-secondary'"
          >
            +{{ stat.displayNumber }}
          </div>

          <div class="flex flex-col  pl-4 lg:pl-6">
            <span
              class="text-size22 lg:text-[19px] font-bold text-blueSix leading-tight"
            >
              {{ stat.title }}
            </span>
            <span
              [class]="
                stat.isHighlighted
                  ? 'text-[15px] text-gray-400'
                  : 'text-[16px] text-[#003366] font-semibold'
              "
            >
              {{ stat.subtitle }}
            </span>
          </div>
        </div>
      }
    </div>
  </div>
</div>
