<div #statsSection class="w-full flex flex-col lg:flex-row items-stretch font-sans h-[492px] overflow-hidden relative">
  
  <div class="w-full lg:w-1/2 h-full">
    <img src="assets/imgs/bakery.svg" 
         alt="Respaldo SURA" 
         class="w-full h-full object-fill object-center"> 
  </div>

  <div class="w-full lg:w-1/2  py-12 lg:py-16 px-6 lg:pl-4 lg:pr-20 flex flex-col justify-center relative h-full lg:-ml-16 z-10">
    
    <img src="assets/imgs/plant.svg" 
         alt="Decoración Planta" 
         class="absolute z-20 bottom-0 pointer-events-none left-[-20px] lg:left-[-110px]"
         style="width: 167px; height: 149px; max-width: none;">

    <h2 class="text-[28px] lg:text-[34px] font-bold text-[#2D4A5E] leading-tight mb-8 z-0 relative">
      El Respaldo y la Experiencia de <span class="text-[#003366]">SURA</span>
    </h2>

    <div class="space-y-4 max-w-md z-0 relative">
      
      @for (stat of stats; track stat.title) {
        <div class="flex items-center p-6 lg:p-7 bg-white rounded-[20px]"
             [class]="stat.isHighlighted 
                      ? 'border border-[#00D1FF] shadow-[0_0_15px_rgba(0,209,255,0.15)]' 
                      : 'border border-gray-100 shadow-sm'">
                      
          <div class="text-[40px] lg:text-[48px] font-extrabold leading-none mr-4"
               [class]="stat.isHighlighted ? 'text-[#2D4A5E]' : 'text-[#00A99D]'">
            +{{ stat.displayNumber }}
          </div>
          
          <div class="flex flex-col border-l border-gray-200 pl-4 lg:pl-6">
            <span class="text-[17px] lg:text-[19px] font-bold text-[#2D4A5E] leading-tight">
              {{ stat.title }}
            </span>
            <span [class]="stat.isHighlighted 
                           ? 'text-[15px] text-gray-400' 
                           : 'text-[16px] text-[#003366] font-semibold'">
              {{ stat.subtitle }}
            </span>
          </div>
          
        </div>
      }
      
    </div>
  </div>
</div>
