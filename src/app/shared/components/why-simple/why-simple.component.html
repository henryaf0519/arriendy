<section class="relative w-full bg-white overflow-visible  min-h-[495px] flex items-center">

  <div class="flex justify-center z-10 max-w-7xl mx-auto px-6 md:px-12 w-full">
    <div class="max-w-xl md:max-w-2xl">

      <h2 class="text-4xl md:text-5xl font-extrabold text-[#2D4A5E] mb-12 md:mb-16 leading-tight">
        Diseñado para ser simple
      </h2>

      <div class="space-y-10 md:space-y-12">

        @for (beneficio of beneficios; track beneficio.titulo) {
        <div class="flex items-start gap-6">
          <div class="w-8 h-8 rounded-full bg-third flex items-center justify-center shrink-0 shadow-inner mt-1">
            <img src="assets/imgs/check.svg" class="w-4 h-4" alt="check">
          </div>

          <div class="flex-grow">
            <h4 class="text-lg font-bold text-[#2D4A5E] mb-1.5 leading-tight">
              {{ beneficio.titulo }}
            </h4>
            <p class="text-gray-600 text-[15px] leading-relaxed">
              {{ beneficio.desc }}
            </p>
          </div>
        </div>
        }

      </div>
    </div>
  </div>

  <img src="assets/gifs/homeT.gif" alt="Ilustración Proceso Simple" class="absolute bottom-0 right-[0] 
              h-[731px] w-auto max-w-none 
              object-contain object-bottom z-0 pointer-events-none 
              hidden md:block transition-all duration-500">

</section>
